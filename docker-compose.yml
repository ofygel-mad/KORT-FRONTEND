version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: kort-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: kort
      POSTGRES_PASSWORD: kort_secret
      POSTGRES_DB: kort_db
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data:
